name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  # ── Unit tests — every push and PR ────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npm test

  # ── Prebuild + E2E — master push only, self-hosted arm64 ─────────────────
  prebuild-arm64:
    name: Prebuild (linux-arm64)
    runs-on: [self-hosted, Linux, ARM64, e2e]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npm run prebuild

      - uses: actions/upload-artifact@v4
        with:
          name: ci-prebuilds-linux-arm64
          path: prebuilds/
          if-no-files-found: error

  # ── E2E tests — self-hosted arm64, real hardware ───────────────────────────
  e2e-arm64:
    name: E2E Tests (linux/arm64)
    runs-on: [self-hosted, Linux, ARM64, e2e]
    needs: prebuild-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci --ignore-scripts

      - uses: actions/download-artifact@v4
        with:
          name: ci-prebuilds-linux-arm64
          path: prebuilds/

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          GPIO_CHIP: 0
          GPIO_OUTPUT_OFFSET: 4
          SPI_BUS: 0
          SPI_DEVICE: 0
