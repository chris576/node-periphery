name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  # ── 1a. Native prebuild for linux-x64 ────────────────────────────────────
  prebuild-x64:
    name: Prebuild (linux-x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Create prebuilt binary
        run: npm run prebuild

      - uses: actions/upload-artifact@v4
        with:
          name: prebuilds-linux-x64
          path: prebuilds/
          if-no-files-found: error

  # ── 1b. Native prebuild for linux-arm64 (self-hosted runner) ───────────────
  prebuild-arm64:
    name: Prebuild (linux-arm64)
    runs-on: [self-hosted, Linux, ARM64, e2e]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Create prebuilt binary
        run: npm run prebuild

      - uses: actions/upload-artifact@v4
        with:
          name: prebuilds-linux-arm64
          path: prebuilds/
          if-no-files-found: error

  # ── 2. Publish to GitHub Packages ───────────────────────────────────────
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: [prebuild-x64, prebuild-arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          cache: 'npm'

      - run: npm ci --ignore-scripts

      - name: Validate tag matches package.json version
        run: |
          TAG="${{ github.ref_name }}"
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Download all prebuilt binaries
        uses: actions/download-artifact@v4
        with:
          pattern: prebuilds-*
          path: prebuilds/
          merge-multiple: true

      - name: Publish package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
